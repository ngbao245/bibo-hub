<!DOCTYPE html>
<html lang="vi" style="background: #1e1e1e;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools Hub</title>
    <link rel="icon" type="image/png" href="./assets/icon.png">
    <link rel="stylesheet" href="common.css">
    
    <!-- Modal Styles -->
    <link rel="stylesheet" href="translate/translate-modal.css">
    <link rel="stylesheet" href="modals/calculator-modal.css">
    <link rel="stylesheet" href="backup/backup-modal.css">
    <link rel="stylesheet" href="encoder/encoder-modal.css">
    <link rel="stylesheet" href="sources/sources-modal.css">
    <link rel="stylesheet" href="sources/sources.css">
    <link rel="stylesheet" href="shortcuts-modal.css">
    
    <style>
        body {
            background: var(--color-bg-primary);
        }

        .hub-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .hub-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .hub-header h1 {
            font-size: 24px;
            color: var(--color-text-primary);
            font-weight: normal;
            letter-spacing: 0.5px;
        }

        .hub-header-link {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text-muted);
            font-size: 12px;
            text-decoration: none;
            font-family: inherit;
            transition: all 0.2s;
        }

        .hub-header-link:hover {
            background: var(--color-bg-secondary);
            border-color: var(--color-accent-primary);
            color: var(--color-text-primary);
        }

        .hub-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .tool-btn {
            flex: 0 0 auto;
            width: 130px;
            height: 130px;
            padding: 20px 12px;
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .tool-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 122, 204, 0.1), transparent);
            transition: left 0.5s;
            z-index: 0;
            pointer-events: none;
        }

        /* Shortcut Tooltip */
        .tool-btn::after {
            content: attr(data-shortcut);
            position: absolute;
            bottom: -32px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(0, 122, 204, 0.3);
            color: #4fc3f7;
            padding: 4px 8px;
            font-size: 10px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s ease 0s;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            border-radius: 3px;
        }

        .tool-btn:hover::after {
            opacity: 1;
            transition: opacity 0.2s ease 0.7s;
        }

        .tool-btn:hover::before {
            left: 100%;
        }

        .tool-btn:hover {
            background: var(--color-bg-elevated);
            border-color: var(--color-accent-primary);
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            z-index: 5;
        }

        .tool-btn:active {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .tool-btn:active::after {
            opacity: 0;
            transition: none;
        }

        .tool-icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
            filter: grayscale(0.3);
            transition: all 0.2s;
            position: relative;
            z-index: 1;
        }

        .tool-btn:hover .tool-icon {
            filter: grayscale(0);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .hub-container {
                padding: 30px 15px;
            }

            .hub-header h1 {
                font-size: 20px;
            }

            .tool-btn {
                width: 100px;
                height: 100px;
                padding: 15px 10px;
                font-size: 12px;
            }
            
            .tool-icon {
                font-size: 28px;
                margin-bottom: 8px;
            }
            
            /* Hide tooltips on mobile */
            .tool-btn::after {
                display: none;
            }
        }
    </style>
</head>
<body>
    <a href="sources/sources.html" class="hub-header-link">💾 Sources Page</a>
    <button class="hub-header-link" onclick="openShortcutsModalLazy()" style="left: 20px; right: auto; cursor: pointer;">⌨️ Shortcuts</button>
    
    <div class="hub-container">
        <div class="hub-header">
            <h1>Mini Tools</h1>
        </div>

        <div class="hub-grid">
            <button class="tool-btn" onclick="openTranslateModalLazy()" data-shortcut="Alt+T">
                <span class="tool-icon">🌐</span>
                Translate
            </button>

            <button class="tool-btn" onclick="openCalculatorModalLazy()" data-shortcut="Alt+C">
                <span class="tool-icon">🔢</span>
                Calculator
            </button>

            <button class="tool-btn" onclick="openTimer()" data-shortcut="Alt+Shift+T">
                <span class="tool-icon">⏱️</span>
                Timer
            </button>

            <button class="tool-btn" onclick="openNotes()" data-shortcut="Alt+N">
                <span class="tool-icon">📝</span>
                Notes
            </button>

            <button class="tool-btn" onclick="openEncoderModalLazy()" data-shortcut="Alt+E">
                <span class="tool-icon">🔐</span>
                Encoder
            </button>

            <button class="tool-btn" onclick="openColor()" data-shortcut="Alt+Shift+C">
                <span class="tool-icon">🎨</span>
                Color
            </button>

            <button class="tool-btn" onclick="openQR()" data-shortcut="Alt+Q">
                <span class="tool-icon">📱</span>
                QR Code
            </button>

            <button class="tool-btn" onclick="openJSON()" data-shortcut="Alt+J">
                <span class="tool-icon">📋</span>
                JSON
            </button>

            <button class="tool-btn" onclick="openMarkdown()" data-shortcut="Alt+M">
                <span class="tool-icon">📄</span>
                Markdown
            </button>

            <button class="tool-btn" onclick="openUnit()" data-shortcut="Alt+U">
                <span class="tool-icon">📏</span>
                Unit
            </button>

            <button class="tool-btn" onclick="openBackupModalLazy()" data-shortcut="Alt+B">
                <span class="tool-icon">📦</span>
                Backup
            </button>

            <button class="tool-btn" onclick="openSourcesModal()" data-shortcut="Alt+P">
                <span class="tool-icon">💾</span>
                Sources
            </button>
        </div>
    </div>

    <!-- Sources Modal -->
    <div id="sourcesModal" class="sources-modal">
        <div class="sources-modal-content">
            <div class="sources-modal-header">
                <div class="sources-modal-title">💾 Sources</div>
                <button class="sources-modal-close-btn" onclick="closeSourcesModal()">×</button>
            </div>
            <div class="sources-modal-body">
                <div class="app-container">
                    <div class="sidebar">
                        <div class="sidebar-header">
                            <h3>SOURCES</h3>
                            <button class="btn-new" onclick="newSourceModal()">+</button>
                        </div>
                        
                        <div class="search-box">
                            <div class="search-wrapper">
                                <input type="text" id="sourcesSearchInput" placeholder="Search sources..." class="search-input">
                                <button class="btn-clear-search" id="sourcesClearSearch" onclick="clearSourcesSearch()" style="display: none;">×</button>
                            </div>
                        </div>
                        
                        <div class="notes-list-container" id="sourcesListModal">
                            <div style="padding: 20px; text-align: center; color: #858585;">Loading...</div>
                        </div>
                    </div>

                    <div class="editor-container">
                        <div id="sourcesEditorView" class="editor-content">
                            <div class="empty-editor">Select a source or create a new one</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals will be injected here by loaders -->

    <script src="./config.js"></script>
    
    <!-- Sources Modal JS -->
    <script src="sources/sources-modal.js"></script>
    
    <!-- Global Modal Loaders -->
    <script src="translate/translate-loader.js"></script>
    <script src="modals/calculator-loader.js"></script>
    <script src="encoder/encoder-loader.js"></script>
    <script src="backup/backup-loader.js"></script>
    
    <!-- Keyboard Shortcuts -->
    <script src="shortcuts-config.js"></script>
    <script src="shortcuts-loader.js"></script>
    <script src="global-shortcuts.js"></script>
    
    <script>
        // Global modal close handlers
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAllModals();
            }
        });

        // Close on outside click
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal') || e.target.classList.contains('shortcuts-modal')) {
                e.target.classList.remove('show');
            }
        });

        // Placeholder functions
        function openTimer() { alert('Timer - Coming soon!'); }
        function openNotes() { window.location.href = 'notes/notes.html'; }
        function openColor() { alert('Color Picker - Coming soon!'); }
        function openQR() { alert('QR Code - Coming soon!'); }
        function openJSON() { alert('JSON Formatter - Coming soon!'); }
        function openMarkdown() { alert('Markdown Preview - Coming soon!'); }
        function openUnit() { alert('Unit Converter - Coming soon!'); }
    </script>
</body>
</html>
