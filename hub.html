<!DOCTYPE html>
<html lang="vi" style="background: #1e1e1e;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools Hub</title>
    <link rel="icon" type="image/png" href="./assets/icon.png">
    <link rel="shortcut icon" type="image/png" href="assets/icon.png">
    
    <!-- iOS Home Screen Icon -->
    <link rel="apple-touch-icon" href="assets/icon.png">
    
    <!-- iOS Web App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BiBo Tools">

    <link rel="stylesheet" href="common.css">
    
    <!-- Modal Styles (loaded by loaders for translate, calculator, encoder, backup) -->
    <link rel="stylesheet" href="sources/sources-modal.css">
    <link rel="stylesheet" href="sources/sources.css">
    <link rel="stylesheet" href="shortcut/shortcuts-modal.css">
    <link rel="stylesheet" href="secret/secret-modal.css">
    <link rel="stylesheet" href="notes/notes.css">
    
    <style>
        /* Disable text selection in hub */
        body {
            background: var(--color-bg-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        /* Container */
        .container {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--color-bg-secondary);
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 10px;
            background: #323233;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            font-size: var(--font-md);
            color: var(--color-text-secondary);
            font-weight: normal;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative; /* For absolute positioned children */
        }

        .hub-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hub-header-link {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text-muted);
            font-size: 12px;
            text-decoration: none;
            font-family: inherit;
            transition: all 0.2s;
        }

        .hub-header-link:hover {
            background: var(--color-bg-secondary);
            border-color: var(--color-accent-primary);
            color: var(--color-text-primary);
        }

        .hub-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .tool-btn {
            flex: 0 0 auto;
            width: 130px;
            height: 130px;
            padding: 20px 12px;
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .tool-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 122, 204, 0.1), transparent);
            transition: left 0.5s;
            z-index: 0;
            pointer-events: none;
        }

        /* Shortcut Tooltip */
        .tool-btn::after {
            content: attr(data-shortcut);
            position: absolute;
            bottom: -32px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(0, 122, 204, 0.3);
            color: #4fc3f7;
            padding: 4px 8px;
            font-size: 10px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s ease 0s;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            border-radius: 3px;
        }

        .tool-btn:hover::after {
            opacity: 1;
            transition: opacity 0.2s ease 0.7s;
        }

        .tool-btn:hover::before {
            left: 100%;
        }

        .tool-btn:hover {
            background: var(--color-bg-elevated);
            border-color: var(--color-accent-primary);
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            z-index: 5;
        }

        .tool-btn:active {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .tool-btn:active::after {
            opacity: 0;
            transition: none;
        }

        .tool-icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
            filter: grayscale(0.3);
            transition: all 0.2s;
            position: relative;
            z-index: 1;
        }

        .tool-btn:hover .tool-icon {
            filter: grayscale(0);
            transform: scale(1.1);
        }

        /* Mobile Header */
        .mobile-header {
            display: none;
            padding: 15px;
            background: var(--color-bg-secondary);
            border-bottom: 1px solid var(--color-border);
            align-items: center;
            gap: 15px;
        }

        .mobile-header h2 {
            font-size: 18px;
            color: var(--color-text-primary);
            font-weight: 500;
            margin: 0;
        }

        .mobile-hamburger {
            background: transparent;
            border: none;
            color: var(--color-text-primary);
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
            transition: all 0.2s;
        }

        .mobile-hamburger:hover {
            color: var(--color-accent-primary);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .mobile-header {
                display: flex;
            }

            .container {
                flex-direction: column;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 280px;
                height: 100vh;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.mobile-visible {
                transform: translateX(0);
            }

            .main-content {
                width: 100%;
                flex: 1;
            }

            .hub-container {
                padding: 30px 15px;
            }

            .tool-btn {
                width: 100px;
                height: 100px;
                padding: 15px 10px;
                font-size: 12px;
            }
            
            .tool-icon {
                font-size: 28px;
                margin-bottom: 8px;
            }
            
            /* Hide tooltips on mobile */
            .tool-btn::after {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>HUB</h3>
            </div>
            
            <!-- Navigation -->
            <div class="app-nav">
                <a href="hub.html" class="nav-link active"><img src="assets/apps.png" alt="Hub" style="vertical-align: middle; opacity: 0.7; width: 20px; height: 20px;"></a>
                <a href="notes/notes.html" class="nav-link">Notes</a>
                <a href="tasks/tasks.html" class="nav-link">Tasks</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header Buttons -->
            <button class="hub-header-link" onclick="openShortcutsModalLazy()" style="left: 20px; right: auto; cursor: pointer;">⌨️ Shortcuts</button>
            <a href="sources/sources.html" class="hub-header-link">💾 Sources Page</a>
            
            <div class="hub-container">
                <div class="hub-grid">
            <button class="tool-btn" onclick="openTranslateModalLazy()" data-shortcut="Alt+T">
                <span class="tool-icon">🌐</span>
                Translate
            </button>

            <button class="tool-btn" onclick="openCalculatorModalLazy()" data-shortcut="Alt+C">
                <span class="tool-icon">🔢</span>
                Calculator
            </button>

            <button class="tool-btn" onclick="openTimer()" data-shortcut="Alt+Shift+T">
                <span class="tool-icon">⏱️</span>
                Timer
            </button>

            <button class="tool-btn" onclick="openNotes()" data-shortcut="Alt+N">
                <span class="tool-icon">📝</span>
                Notes
            </button>

            <button class="tool-btn" onclick="openEncoderModalLazy()" data-shortcut="Alt+E">
                <span class="tool-icon">🔐</span>
                Encoder
            </button>

            <button class="tool-btn" onclick="openColor()" data-shortcut="Alt+Shift+C">
                <span class="tool-icon">🎨</span>
                Color
            </button>

            <button class="tool-btn" onclick="openQR()" data-shortcut="Alt+Q">
                <span class="tool-icon">📱</span>
                QR Code
            </button>

            <button class="tool-btn" onclick="openJSON()" data-shortcut="Alt+J">
                <span class="tool-icon">📋</span>
                JSON
            </button>

            <button class="tool-btn" onclick="openMarkdown()" data-shortcut="Alt+M">
                <span class="tool-icon">📄</span>
                Markdown
            </button>

            <button class="tool-btn" onclick="openUnit()" data-shortcut="Alt+U">
                <span class="tool-icon">📏</span>
                Unit
            </button>

            <button class="tool-btn" onclick="openBackupModalLazy()" data-shortcut="Alt+B">
                <span class="tool-icon">📦</span>
                Backup
            </button>

            <button class="tool-btn" onclick="openSourcesModal()" data-shortcut="Alt+P">
                <span class="tool-icon">💾</span>
                Sources
            </button>

            <button class="tool-btn" onclick="openSecretModal()" data-shortcut="">
                <span class="tool-icon">🔒</span>
                Secret
            </button>
        </div>
    </div>

    <!-- Sources Modal -->
    <div id="sourcesModal" class="sources-modal">
        <div class="sources-modal-content">
            <div class="sources-modal-header">
                <div class="sources-modal-title">💾 Sources</div>
                <button class="sources-modal-close-btn" onclick="closeSourcesModal()">×</button>
            </div>
            <div class="sources-modal-body">
                <div class="app-container">
                    <div class="sidebar">
                        <div class="sidebar-header">
                            <h3>SOURCES</h3>
                            <button class="btn-new" onclick="newSourceModal()">+</button>
                        </div>
                        
                        <div class="search-box">
                            <div class="search-wrapper">
                                <input type="text" id="sourcesSearchInput" placeholder="Search sources..." class="search-input">
                                <button class="btn-clear-search" id="sourcesClearSearch" onclick="clearSourcesSearch()" style="display: none;">×</button>
                            </div>
                        </div>
                        
                        <div class="notes-list-container" id="sourcesListModal">
                            <div style="padding: 20px; text-align: center; color: #858585;">Loading...</div>
                        </div>
                    </div>

                    <div class="editor-container">
                        <div id="sourcesEditorView" class="editor-content">
                            <div class="empty-editor">Select a source or create a new one</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals will be injected here by loaders -->

    <!-- Secret Notes Modal -->
    <div id="secretModal" class="secret-modal">
        <div class="secret-modal-content">
            <div class="secret-modal-header">
                <div class="secret-modal-title">🔒 Secret Notes</div>
                <button class="secret-modal-close-btn" onclick="closeSecretModal()">×</button>
            </div>
            <div class="secret-modal-body">
                <!-- Content will be injected by JS -->
            </div>
        </div>
    </div>

    <script src="./config.js"></script>
    
    <!-- Sources Modal JS -->
    <script src="sources/sources-modal.js"></script>
    
    <!-- Secret Notes Modal JS -->
    <script src="secret/secret-modal.js"></script>
    
    <!-- Global Modal Loaders -->
    <script src="translate/translate-loader.js"></script>
    <script src="modals/calculator-loader.js"></script>
    <script src="encoder/encoder-loader.js"></script>
    <script src="backup/backup-loader.js"></script>
    <script src="daily-reminder/daily-reminder-loader.js"></script>
    
    <!-- Keyboard Shortcuts -->
    <script src="shortcut/shortcuts-config.js"></script>
    <script src="shortcut/shortcuts-loader.js"></script>
    <script src="shortcut/global-shortcuts.js"></script>
    
    <!-- Mobile Interface -->
    <script src="hub-mobile.js"></script>
    
    <script>
        // Save current page
        localStorage.setItem('app_currentPage', 'hub');

        // Global modal close handlers
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAllModals();
            }
        });

        // Close on outside click
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal') || e.target.classList.contains('shortcuts-modal')) {
                e.target.classList.remove('show');
            }
        });

        // Placeholder functions
        function openTimer() { alert('Timer - Coming soon!'); }
        function openNotes() { window.location.href = 'notes/notes.html'; }
        function openColor() { alert('Color Picker - Coming soon!'); }
        function openQR() { alert('QR Code - Coming soon!'); }
        function openJSON() { alert('JSON Formatter - Coming soon!'); }
        function openMarkdown() { alert('Markdown Preview - Coming soon!'); }
        function openUnit() { alert('Unit Converter - Coming soon!'); }
    </script>
            </div> <!-- Close hub-container -->
        </div> <!-- Close main-content -->
    </div> <!-- Close container -->
</body>
</html>
