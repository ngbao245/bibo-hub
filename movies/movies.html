<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies Tracker - BiBo</title>
        <link rel="icon" type="image/png" href="../assets/icon.png">
    <link rel="shortcut icon" type="image/png" href="../assets/icon.png">
    
    <!-- iOS Home Screen Icon -->
    <link rel="apple-touch-icon" href="../assets/icon.png">
    
    <!-- iOS Web App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BiBo Tools">

    <link rel="stylesheet" href="../common.css">

    <link rel="stylesheet" href="./movies.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>MOVIES</h3>
            </div>
            
            <!-- Navigation -->
            <div class="app-nav">
                <a href="../hub.html" class="nav-link"><img src="../assets/apps.png" alt="Hub" style="vertical-align: middle; opacity: 0.7; width: 20px; height: 20px;"></a>
                <a href="../notes/notes.html" class="nav-link">Notes</a>
                <a href="../tasks/tasks.html" class="nav-link">Tasks</a>
            </div>

            <div class="sidebar-section">
                <h4>Status</h4>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-status="all">All</button>
                    <button class="filter-btn" data-status="watching">Watching</button>
                    <button class="filter-btn" data-status="completed">Completed</button>
                    <button class="filter-btn" data-status="plan">Plan to Watch</button>
                </div>
            </div>

            <div class="sidebar-section">
                <h4>Type</h4>
                <div class="filter-buttons">
                    <button class="type-btn active" data-type="all">All</button>
                    <button class="type-btn" data-type="movie">Movies</button>
                    <button class="type-btn" data-type="series">Series</button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="content-header">
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Search movies..." class="search-input">
                </div>
                <button id="addMovieBtn" class="btn btn-primary">+ Add Movie</button>
            </div>

            <div id="moviesList" class="movies-list">
                <!-- Movies will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="movieModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Add Movie</span>
                <button class="modal-close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="movieForm">
                    <div class="form-group">
                        <label>Title *</label>
                        <input type="text" id="movieTitle" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Type *</label>
                            <select id="movieType" required>
                                <option value="movie">Movie (Phim lẻ)</option>
                                <option value="series">Series (Phim bộ)</option>
                            </select>
                        </div>

                        <div class="form-group" id="totalTimeGroup">
                            <label>Total Time *</label>
                            <input type="text" id="totalTime" placeholder="120 or 12 34" required>
                            <small style="color: var(--color-text-muted); font-size: var(--font-xs); display: block; margin-top: 4px;">
                                VD: 120 (120 phút) or 12 34 (12:34)
                            </small>
                        </div>
                    </div>

                    <div class="form-group" id="statusGroup">
                        <label>Status *</label>
                        <select id="movieStatus" required>
                            <option value="plan">Plan to Watch</option>
                            <option value="watching">Watching</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>

                    <!-- Movie fields -->
                    <div id="movieFields" class="type-fields">
                        <div class="form-group" id="currentTimeGroup">
                            <label>Current Time</label>
                            <input type="text" id="currentTime" placeholder="45 30">
                            <small style="color: var(--color-text-muted); font-size: var(--font-xs); display: block; margin-top: 4px;">
                                VD: 45 30 (45 phút 30 giây)
                            </small>
                        </div>
                    </div>

                    <!-- Series fields -->
                    <div id="seriesFields" class="type-fields" style="display: none;">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Season</label>
                                <input type="number" id="season" min="1" value="1">
                            </div>
                            <div class="form-group">
                                <label>Current Episode</label>
                                <input type="number" id="currentEpisode" min="0" value="0">
                            </div>
                            <div class="form-group">
                                <label>Total Episodes *</label>
                                <input type="number" id="totalEpisodes" min="1" value="12">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Current Episode Time</label>
                            <input type="text" id="episodeDuration" placeholder="20">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="movieNotes" rows="3" placeholder="Your thoughts..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Movie URL (Link xem phim)</label>
                        <input type="url" id="movieUrl" placeholder="https://netflix.com/watch/...">
                    </div>

                    <div class="form-group">
                        <label>Rating</label>
                        <div class="rating-input">
                            <span class="star" data-rating="1">☆</span>
                            <span class="star" data-rating="2">☆</span>
                            <span class="star" data-rating="3">☆</span>
                            <span class="star" data-rating="4">☆</span>
                            <span class="star" data-rating="5">☆</span>
                        </div>
                        <input type="hidden" id="movieRating" value="0">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <button type="button" class="btn" id="cancelBtn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="movies.js"></script>
    <script src="movies-mobile.js"></script>
</body>
</html>
