​<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiBo Tools</title>
    <link rel="icon" type="image/png" href="./assets/icon.png">
    <link rel="shortcut icon" type="image/png" href="assets/icon.png">
    
    <!-- iOS Home Screen Icon -->
    <link rel="apple-touch-icon" href="assets/icon.png">
    
    <!-- iOS Web App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BiBo Tools">
</head>
<body>
    <script>
        // Redirect to last visited page or hub
        const lastPage = localStorage.getItem('app_currentPage');
        
        if (lastPage === 'notes') {
            window.location.href = 'notes/notes.html';
        } else if (lastPage === 'tasks') {
            window.location.href = 'tasks/tasks.html';
        } else {
            window.location.href = 'hub.html';
        }
    </script>
</body>
</html>
