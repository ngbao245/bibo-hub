<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - BiBo</title>
    <link rel="icon" type="image/png" href="./assets/icon.png">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./richtext-editor.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>NOTES</h3>
                <button class="btn-new" onclick="newNote()">+</button>
            </div>
            <div class="search-box">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="Search..." class="search-input">
                    <button class="btn-clear-search" id="clearSearch" onclick="clearSearch()" style="display: none;">×</button>
                </div>
            </div>
            <div class="notes-list-container" id="notesList">
                <div style="padding: 20px; text-align: center; color: #858585;">Loading...</div>
            </div>
        </div>

        <!-- Editor -->
        <div class="editor-container">
            <div id="editorView" class="editor-content">
                <div class="empty-editor">
                    Select a note or create a new one
                </div>
            </div>
        </div>
    </div>

    <script src="./storage.js"></script>
    <script src="./config.js"></script>
    <script src="./richtext-editor.js"></script>
    <script src="./app.js"></script>
</body>
</html>
