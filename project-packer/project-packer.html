<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Packer - Pack & Unpack Projects</title>
    <link rel="icon" type="image/png" href="../assets/icon.png">
    <link rel="shortcut icon" type="image/png" href="../assets/icon.png">

    <!-- iOS Home Screen Icon -->
    <link rel="apple-touch-icon" href="assets/icon.png">

    <!-- iOS Web App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BiBo Tools">

    <link rel="stylesheet" href="./project-packer.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>[Project Packer]</h1>
            <p>Pack and unpack HTML/CSS/JS projects</p>
            <a href="../hub.html" class="back-to-hub">← Back to Hub</a>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('pack')">📥 Pack Project</button>
            <button class="tab" onclick="switchTab('unpack')">📤 Unpack Project</button>
        </div>

        <div class="content">
            <!-- Tab Đóng gói -->
            <div id="pack-tab" class="tab-content active">
                <div class="upload-area" id="packUploadArea" onclick="document.getElementById('folderInput').click()">
                    <div class="icon">📁</div>
                    <h3>Select your project folder</h3>
                    <p>Drag & drop folder here or click to select</p>
                    <input type="file" id="folderInput" webkitdirectory directory multiple>
                </div>
                <div id="packTerminal" class="terminal-log"></div>
                <div id="packFileList" class="file-list" style="display:none;"></div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="packBtn" onclick="packProject()" style="display:none;">
                        [Save] Create .txt file
                    </button>
                    <button class="btn btn-danger" id="packStopBtn" onclick="stopProcess('pack')" style="display:none;">
                        [■] Stop
                    </button>
                    <button class="btn" id="packResetBtn" onclick="resetProcess('pack')" style="display:none;">
                        [↻] Reset
                    </button>
                </div>
                <div class="progress-container" id="packProgress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="packProgressFill"></div>
                    </div>
                    <div class="progress-text" id="packProgressText">Processing...</div>
                </div>
                <div id="packErrorLog" class="error-log">
                    <div class="error-log-header">
                        <span>[!] Failed Files</span>
                        <button class="btn btn-small" onclick="clearErrorLog('pack')">Clear</button>
                    </div>
                    <div id="packErrorList"></div>
                </div>
                <div id="packStatus" class="status"></div>
            </div>

            <!-- Tab Giải nén -->
            <div id="unpack-tab" class="tab-content">
                <div class="upload-area" id="unpackUploadArea" onclick="document.getElementById('txtInput').click()">
                    <div class="icon">📂</div>
                    <h3>Select packed .zip file</h3>
                    <p>Drag & drop .zip file here or click to select</p>
                    <input type="file" id="txtInput" accept=".zip">
                </div>
                <div id="unpackFileList" class="file-list" style="display:none;"></div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="unpackBtn" onclick="unpackProject()" style="display:none;">
                        [>>] Unpack Project
                    </button>
                    <button class="btn btn-danger" id="unpackStopBtn" onclick="stopProcess('unpack')" style="display:none;">
                        [■] Stop
                    </button>
                    <button class="btn" id="unpackResetBtn" onclick="resetProcess('unpack')" style="display:none;">
                        [↻] Reset
                    </button>
                </div>
                <div class="progress-container" id="unpackProgress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="unpackProgressFill"></div>
                    </div>
                    <div class="progress-text" id="unpackProgressText">Processing...</div>
                </div>
                <div id="unpackErrorLog" class="error-log">
                    <div class="error-log-header">
                        <span>[!] Failed Files</span>
                        <button class="btn btn-small" onclick="clearErrorLog('unpack')">Clear</button>
                    </div>
                    <div id="unpackErrorList"></div>
                </div>
                <div id="unpackStatus" class="status"></div>
            </div>
        </div>
    </div>

    <script src="./project-packer.js"></script>
    <!-- JSZip Library for creating ZIP files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</body>

</html>
